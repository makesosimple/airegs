## ITO Demo instance — docker compose -f docker-compose.yml -f docker-compose.ito.yml up -d
services:
  open-webui-ito:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ito-webui
    ports:
      - "3081:8080"
    volumes:
      - open_webui_ito_data:/app/backend/data
      # İTO branding — logo & favicon mount
      - ./branding/ito/logo.png:/app/backend/open_webui/static/logo.png:ro
      - ./branding/ito/favicon.png:/app/backend/open_webui/static/favicon.png:ro
      - ./branding/ito/favicon.ico:/app/backend/open_webui/static/favicon.ico:ro
      - ./branding/ito/favicon-96x96.png:/app/backend/open_webui/static/favicon-96x96.png:ro
      - ./branding/ito/favicon-dark.png:/app/backend/open_webui/static/favicon-dark.png:ro
      - ./branding/ito/apple-touch-icon.png:/app/backend/open_webui/static/apple-touch-icon.png:ro
      - ./branding/ito/web-app-manifest-192x192.png:/app/backend/open_webui/static/web-app-manifest-192x192.png:ro
      - ./branding/ito/web-app-manifest-512x512.png:/app/backend/open_webui/static/web-app-manifest-512x512.png:ro
      - ./branding/ito/splash.png:/app/backend/open_webui/static/splash.png:ro
      - ./branding/ito/splash-dark.png:/app/backend/open_webui/static/splash-dark.png:ro
      - ./branding/ito/logo.png:/app/build/static/logo.png:ro
      - ./branding/ito/favicon.png:/app/build/static/favicon.png:ro
      - ./branding/ito/favicon.ico:/app/build/static/favicon.ico:ro
      - ./branding/ito/favicon-96x96.png:/app/build/static/favicon-96x96.png:ro
      - ./branding/ito/favicon-dark.png:/app/build/static/favicon-dark.png:ro
      - ./branding/ito/apple-touch-icon.png:/app/build/static/apple-touch-icon.png:ro
      - ./branding/ito/web-app-manifest-192x192.png:/app/build/static/web-app-manifest-192x192.png:ro
      - ./branding/ito/web-app-manifest-512x512.png:/app/build/static/web-app-manifest-512x512.png:ro
      - ./branding/ito/splash.png:/app/build/static/splash.png:ro
      - ./branding/ito/splash-dark.png:/app/build/static/splash-dark.png:ro
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OPENAI_API_BASE_URL=http://host.docker.internal:8001/v1
      - OPENAI_API_KEY=ito-demo
      - WEBUI_AUTH=true
      - ENABLE_SIGNUP=true
      - WEBUI_NAME=İTO Asistan - İstanbul Ticaret Odası
      - DEFAULT_LOCALE=tr-TR
      - DEFAULT_USER_ROLE=admin
      - 'DEFAULT_PROMPT_SUGGESTIONS=[{"title":["Ticaret sicili","işlemleri hakkında bilgi ver"]},{"title":["İhracat belgeleri","hangi ülkeye ne düzenlenir"]},{"title":["A.TR dolaşım belgesi","nedir, nasıl alınır"]},{"title":["KOSGEB destekleri","nelerdir, nasıl başvurulur"]},{"title":["Kapasite raporu","nasıl alınır"]},{"title":["Limited şirket","kuruluş süreci nasıl"]},{"title":["Yatırım teşvikleri","hangi destekler var"]},{"title":["İTO üyelik","hizmetleri nelerdir"]}]'
      - RAG_EMBEDDING_ENGINE=
      - ENABLE_RAG_WEB_LOADER_SSL_VERIFICATION=false
      - RAG_EMBEDDING_MODEL=
      - ENABLE_RAG_LOCAL_WEB_FETCH=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - qdrant

volumes:
  open_webui_ito_data:
